replicaCount: 3

image:
  repository: adeptus
  tag: latest
  pullPolicy: IfNotPresent

serviceAccount:
  create: true
  name: ""

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: api.adeptus.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: adeptus-tls
      hosts:
        - api.adeptus.example.com

resources:
  requests:
    memory: 128Mi
    cpu: 100m
  limits:
    memory: 256Mi
    cpu: 500m

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

podDisruptionBudget:
  enabled: true
  minAvailable: 2

env:
  RUST_LOG: "adeptus=info"
  ADEPTUS__SERVER__HOST: "0.0.0.0"
  ADEPTUS__SERVER__PORT: "3000"
  ADEPTUS__DATABASE__MAX_CONNECTIONS: "20"
  ADEPTUS__DATABASE__RUN_MIGRATIONS: "true"
  ADEPTUS__OBSERVABILITY__TRACING__ENABLED: "true"
  ADEPTUS__OBSERVABILITY__LOGGING__FORMAT: "json"
  ADEPTUS__RATE_LIMITING__ENABLED: "true"
  ADEPTUS__FILE_STORAGE__UPLOAD_DIR: "/data/uploads"
  ADEPTUS__FILE_STORAGE__MAX_FILE_SIZE: "104857600"

config:
  natsUrl: "nats://nats:4222"
  ketoReadUrl: "http://keto:4466"
  otlpEndpoint: "http://otel-collector:4317"
  pactumGraphqlUrl: ""

  cdn:
    enabled: false
    baseUrl: ""
    apiKey: ""
    bucketName: ""

secrets:
  databaseUrl: "postgresql://adeptus:password@postgres:5432/adeptus"
  cdnApiKey: ""

containerPort: 3000

persistence:
  enabled: true
  storageClass: ""
  accessModes:
    - ReadWriteMany
  size: 10Gi
  mountPath: /data/uploads

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65534
  runAsGroup: 65534
  fsGroup: 65534

livenessProbe:
  httpGet:
    path: /live
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /ready
    port: http
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

startupProbe:
  httpGet:
    path: /live
    port: http
  initialDelaySeconds: 5
  periodSeconds: 5
  timeoutSeconds: 5
  failureThreshold: 30

nodeSelector: {}
tolerations: []
affinity: {}
podAnnotations: {}
