[server]
host = "0.0.0.0"
port = 3000
timeout_seconds = 30

[database]
url = "postgresql://adeptus:password@localhost:5432/adeptus"
max_connections = 20
min_connections = 5
run_migrations = true

[nats]
stream_name = "ADEPTUS_EVENTS"
max_age_days = 30

[rate_limiting]
enabled = true
global_limit = 10000
per_user_limit = 1000
per_ip_limit = 100
burst_size = 10

[observability.logging]
level = "info"
format = "pretty"

[observability.tracing]
enabled = false
otlp_endpoint = "http://localhost:4317"
sampling_ratio = 0.1

[observability.metrics]
enabled = true

[pdf]
wkhtmltopdf_path = "wkhtmltopdf"
temp_dir = "/tmp/adeptus-pdf"
generation_timeout_seconds = 30

[cdn]
enabled = false
base_url = ""
api_key = ""
bucket_name = ""
upload_timeout_seconds = 30

[file_storage]
upload_dir = "./uploads"
max_file_size = 104857600

[pactum]
